server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:sqlite:./data/blog.db
    driver-class-name: org.sqlite.JDBC
    username:
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: blog-secret-key-for-jwt-token-generation-please-change-in-production
  expiration: 86400000

blog:
  cors:
    allowed-origins: http://localhost:5173
  file:
    upload-path: ./uploads/
