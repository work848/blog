server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:sqlite:./data/blog.db
    driver-class-name: org.sqlite.JDBC
    username:
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  mail:
    host: smtp.example.com
    port: 587
    username: your-email@example.com
    password: your-email-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: blog-secret-key-for-jwt-token-generation-please-change-in-production
  expiration: 86400000

blog:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174
  file:
    upload-path: ./uploads/
  image:
    max-size: 5242880
